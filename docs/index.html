<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Awesome OSS Companies | Cossmology</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --navy:   #00274c;
      --yellow: #ffcb05;
      --green:  #16a34a;
      --bg:     #f9fafb;
      --white:  #ffffff;
      --text:   #111827;
      --muted:  #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--navy);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding: 14px 0 10px;
      border-bottom: 1px solid rgba(255,203,5,0.25);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--yellow);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .brand-sub {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .header-title { flex: 1; min-width: 0; }
    .header-title h1 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--yellow);
      letter-spacing: -0.01em;
      line-height: 1.15;
    }
    .header-title p {
      margin: 3px 0 0;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
    }
    .header-title p a {
      color: rgba(255,255,255,0.85);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .header-title p a:hover { color: var(--yellow); }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--navy);
      background: var(--yellow);
      text-decoration: none;
      border-radius: 6px;
      padding: 6px 12px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .github-link:hover { opacity: 0.88; }

    /* Measure sticky header height so table thead can offset correctly */
    header { --header-height: 0px; }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      padding: 10px 0 12px;
    }

    .controls input[type="search"] {
      flex: 1;
      min-width: 200px;
      max-width: 480px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: var(--white);
    }
    .controls input[type="search"]::placeholder { color: rgba(255,255,255,0.45); }
    .controls input[type="search"]:focus {
      border-color: var(--yellow);
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 0 3px rgba(255,203,5,0.2);
    }

    .controls select {
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      font-size: 0.875rem;
      background: rgba(255,255,255,0.1);
      color: var(--white);
      cursor: pointer;
      outline: none;
      max-width: 240px;
    }
    .controls select option { background: var(--navy); color: var(--white); }
    .controls select:focus { border-color: var(--yellow); }

    .clear-btn {
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      font-size: 0.82rem;
      background: transparent;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      transition: all 0.15s;
    }
    .clear-btn:hover { background: rgba(255,255,255,0.1); color: var(--white); }

    .stats {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      padding: 8px 0;
    }

    main {
      padding: 20px 24px;
      max-width: 1500px;
      margin: 0 auto;
    }

    /* Column widths shared between header and body tables */
    :root {
      --col1: 12%; --col2: 22%; --col3: 10%; --col4: 10%; --col5: 9%; --col6: 9%; --col7: 28%;
      --tbl-min: 900px;
    }

    /* Sticky header sits outside the scroll container */
    .thead-outer {
      position: sticky;
      top: 0;       /* JS will override this */
      z-index: 20;
      background: var(--navy);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      overflow: hidden; /* safe here — no sticky children inside */
    }

    .thead-outer table {
      width: 100%;
      min-width: var(--tbl-min);
      border-collapse: collapse;
      table-layout: fixed;
    }

    .thead-hint td {
      background: var(--navy);
      padding: 5px 12px 4px;
      text-align: center;
      font-size: 0.78rem;
      font-style: italic;
      color: rgba(255,255,255,0.65);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .thead-outer th {
      background: var(--navy);
      color: var(--yellow);
      border-bottom: 2px solid var(--yellow);
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Scrollable body container */
    .table-wrap {
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      min-width: var(--tbl-min);
      border-collapse: separate;
      border-spacing: 0;
      background: var(--white);
      font-size: 0.855rem;
      table-layout: fixed;
    }

    /* Shared column widths */
    .c1 { width: var(--col1); }
    .c2 { width: var(--col2); }
    .c3 { width: var(--col3); }
    .c4 { width: var(--col4); }
    .c5 { width: var(--col5); }
    .c6 { width: var(--col6); text-align: center; }
    .c7 { width: var(--col7); }
    td:nth-child(6) { text-align: center; }

    tbody tr:last-child td:first-child  { border-bottom-left-radius: 7px; }
    tbody tr:last-child td:last-child   { border-bottom-right-radius: 7px; }

    tbody tr td {
      border-bottom: 1px solid var(--border);
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr {
      transition: background 0.1s;
    }
    tbody tr:hover { background: #fffbeb; }

    td {
      padding: 10px 12px;
      vertical-align: top;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    td a { color: #004a9f; text-decoration: none; font-weight: 500; }
    td a:hover { color: var(--navy); text-decoration: underline; }

    .company-name { font-weight: 700; color: var(--navy); }

    td.headlines-cell {
      text-align: center;
    }
    .headlines-link {
      display: inline-block;
      text-decoration: none !important;
      transition: opacity 0.15s;
      line-height: 0;
    }
    .headlines-link img {
      width: 64px;
      height: 64px;
      display: block;
    }
    .headlines-link:hover { opacity: 0.8; }

    .tag {
      display: inline-block;
      background: #fffbeb;
      color: #7d4e00;
      border: 1px solid #fde68a;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.71rem;
      margin: 1px 2px 1px 0;
      white-space: nowrap;
    }

    .category-badge {
      display: inline-block;
      background: #e0f0ff;
      color: #003a7a;
      border: 1px solid #b3d4f5;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.76rem;
      font-weight: 600;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 1rem;
    }

    @media (max-width: 860px) {
      main { padding: 12px; }
      header { padding: 0 12px; }
    }
    @media (max-width: 600px) {
      .header-top { flex-direction: column; align-items: flex-start; gap: 8px; }
      .github-link { align-self: flex-end; }
      .controls { flex-wrap: wrap; gap: 6px; }
      .controls input { min-width: 0; flex: 1 1 100%; }
      .controls select { max-width: none; flex: 1 1 auto; }
    }
  </style>
</head>

const tbody = document.getElementById('tableBody');
const searchInput = document.getElementById('searchInput');
const categoryFilter = document.getElementById('categoryFilter');
const clearBtn = document.getElementById('clearBtn');
const statsEl = document.getElementById('stats');
const noResults = document.getElementById('noResults');
const table = document.getElementById('companiesTable');

function buildRow(c) {
  const techTags = c.tech_tags.map(t => `<span class="tag">${t}</span>`).join('');
  const ossCell = c.oss_url
    ? `<a href="${c.oss_url}" target="_blank" rel="noopener">${c.oss_name || c.oss_url}</a>`
    : '';
  const websiteCell = c.website_url
    ? `<a href="${c.website_url}" target="_blank" rel="noopener">${c.name}</a>`
    : '';
  const headlinesUrl = `https://cossmology.com/organizations/${c.shortname}/headlines`;
  const headlinesCell = `<a class="headlines-link" href="${headlinesUrl}" target="_blank" rel="noopener" title="View headlines on Cossmology"><img src="https://cossmology.com/cossmology_headlines_transparent_bg_154.png" alt="Headlines" loading="lazy"></a>`;
  const companyCell = `<a class="company-name" href="${c.cossmology_url}" target="_blank" rel="noopener">${c.name}</a>`;
  const categoryCell = `<span class="category-badge">${c.category}</span>`;

  return `<tr data-name="${c.name.toLowerCase()}" data-desc="${c.description.toLowerCase()}" data-cat="${c.category.toLowerCase()}" data-tags="${c.tech_tags.join(' ').toLowerCase()}">
    <td>${companyCell}</td>
    <td>${c.description}</td>
    <td>${categoryCell}</td>
    <td>${ossCell}</td>
    <td>${websiteCell}</td>
    <td class="headlines-cell">${headlinesCell}</td>
    <td>${techTags}</td>
  </tr>`;
}

tbody.innerHTML = COMPANIES.map(buildRow).join('');
const allRows = Array.from(tbody.querySelectorAll('tr'));

function updateStats(shown, total) {
  statsEl.textContent = shown === total
    ? `${total.toLocaleString()} companies`
    : `${shown.toLocaleString()} of ${total.toLocaleString()} companies`;
}

function filterTable() {
  const query = searchInput.value.toLowerCase().trim();
  const cat = categoryFilter.value.toLowerCase();
  let shown = 0;

  for (const row of allRows) {
    const matchSearch = !query ||
      row.dataset.name.includes(query) ||
      row.dataset.desc.includes(query) ||
      row.dataset.tags.includes(query) ||
      row.dataset.cat.includes(query);
    const matchCat = !cat || row.dataset.cat === cat;

    if (matchSearch && matchCat) {
      row.style.display = '';
      shown++;
    } else {
      row.style.display = 'none';
    }
  }

  updateStats(shown, allRows.length);
  noResults.style.display = shown === 0 ? 'block' : 'none';
  table.style.display = shown === 0 ? 'none' : '';
}

searchInput.addEventListener('input', filterTable);
categoryFilter.addEventListener('change', filterTable);
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  categoryFilter.value = '';
  filterTable();
  searchInput.focus();
});

filterTable();

// Position the sticky header div just below the sticky nav.
const theadOuter = document.getElementById('theadOuter');
function setHeaderHeight() {
  const navH = document.querySelector('header').getBoundingClientRect().height;
  if (theadOuter) theadOuter.style.top = navH + 'px';
}
setHeaderHeight();
window.addEventListener('resize', setHeaderHeight);

// Sync horizontal scroll: when the body table scrolls, mirror it in the header table.
const tableWrap = document.querySelector('.table-wrap');
if (tableWrap && theadOuter) {
  tableWrap.addEventListener('scroll', () => {
    theadOuter.scrollLeft = tableWrap.scrollLeft;
  });
}
</script>
